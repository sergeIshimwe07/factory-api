spring.application.name=factory-erp


# Server Configuration
server.port=8081

spring.jpa.hibernate.dll-auto = update

spring.datasource.url=jdbc:mysql://localhost:3306/factory_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Configuration
app.jwtSecret=yourSecretKeyHere12345678901234567890123456789012
app.jwtExpirationMs=86400000

# Security
spring.security.filter.order=10

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seeds/${spring.profiles.active:dev}
spring.flyway.baseline-on-migrate=true

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production-make-it-very-long-and-random
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=noreply@factoryerp.com

# Application Configuration
app.name=Factory ERP